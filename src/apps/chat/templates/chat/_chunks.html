{% if chunks %}
<div class="mt-2">
    <p class="text-xs text-gray-400 mb-1">📚 Sources utilisées :</p>
    <div class="flex flex-wrap gap-1">
        {% for chunk in chunks %}
            <span class="inline-block bg-gray-100 text-gray-500 text-xs rounded px-2 py-0.5">
                {{ chunk.source }}
                {% if chunk.page %} p.{{ chunk.page }}{% endif %}
                {% if chunk.similarity %} — {{ chunk.similarity }}{% endif %}
            </span>
        {% endfor %}
    </div>
</div>
{% endif %}
