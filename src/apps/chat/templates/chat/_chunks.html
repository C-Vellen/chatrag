{% if chunks %}

    {% comment %} Afficher les chunks sur une nouvelle page {% endcomment %}
    <p class="text-xs text-gray-400 mb-1">📚 Sources :</p>
    <div class="flex flex-col gap-1">
        {% for chunk in chunks %}
            <span class="inline-block bg-gray-100 text-gray-500 text-xs rounded px-2">
                {{ chunk.titre }}
                {% if chunk.page %} p.{{ chunk.page }}{% endif %}
                {% if chunk.similarity %} — {{ chunk.similarity }}{% endif %}
            </span>
        {% endfor %}
    </div>

{% endif %}
