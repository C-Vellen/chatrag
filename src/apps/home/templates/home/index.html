{% extends 'base.html' %}

{% load static template_tags%}

{% block header %}
{% endblock %}

{% block content %}
    <section id="accueil" class="reachable">
        <div class="mt-6 mb-8 p-4 flex flex-col justify-center items-start bg-slate-200">
            <div id="titre" class="mb-2 ">
                <h1 class="text-sm font-bold sm:text-lg">{{Accueil_titre|find_content:10}}</h1>
            </div>
            <div id="description" class="text-sm">
                <p>{{Accueil_description|find_content:150}}</p>
            </div>
        </div>
         <div class="flex flex-row justify-center sm:justify-end">
            <a href={% url 'ingest:list' %} class="w-80 p-2 my-2 grey-button">Ingestion de documents</a> 
        </div>
        <div class="flex flex-row justify-center sm:justify-end">
            <a href={% url 'retrieval:search' %} class="w-80 p-2 my-2 grey-button">Recherche à partir d'une requête</a> 
        </div>
        <div class="flex flex-row justify-center sm:justify-end">
            <a href={% url 'chat:talk' %} class="w-80 p-2 my-2 grey-button">Lancer une conversation</a> 
        </div>
        
    </section>


{% endblock %}
